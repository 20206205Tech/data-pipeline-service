  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [install-deps]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch secrets from Doppler
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          doppler-project: ${{ secrets.DOPPLER_PROJECT }}
          doppler-config: ${{ secrets.DOPPLER_CONFIG }}
          inject-env-vars: true

      - name: Fetch secrets from Doppler API (Curl)
        id: doppler_json_gen
        run: |
          RESPONSE=$(curl -s --request GET \
            --url "https://api.doppler.com/v3/configs/config/secrets?project=${{ secrets.DOPPLER_PROJECT }}&config=${{ secrets.DOPPLER_CONFIG }}" \
            --header "accept: application/json" \
            --header "authorization: Bearer ${{ secrets.DOPPLER_TOKEN }}")

          if echo "$RESPONSE" | jq -e '.messages' > /dev/null; then
            echo "API Error: $(echo "$RESPONSE" | jq -r '.messages[0]')"
            exit 1
          fi

          FLATTENED_JSON=$(echo "$RESPONSE" | jq -r '.secrets | map_values(.computed) | tojson')
          echo "json_content=$FLATTENED_JSON" >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate Metadata
        id: meta
        run: |
          REPO_NAME_LOW=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          echo "name=$REPO_NAME_LOW" >> $GITHUB_OUTPUT
          echo "full_domain=${REPO_NAME_LOW}.${{ steps.doppler.outputs.DOMAIN }}" >> $GITHUB_OUTPUT
          echo "subdomain=${REPO_NAME_LOW}" >> $GITHUB_OUTPUT

      - name: Initialize Vercel Project
        run: |
          PROJECT_NAME="${{ steps.meta.outputs.name }}"
          echo "Checking/Creating project: $PROJECT_NAME..."
          npx vercel project add "$PROJECT_NAME" --token=${{ steps.doppler.outputs.VERCEL_TOKEN }} --yes || true
          echo "Linking project..."
          npx vercel pull --yes --environment=production --token=${{ steps.doppler.outputs.VERCEL_TOKEN }}




      - name: Sync Doppler Secrets to Vercel
        env:
          DOPPLER_JSON: ${{ steps.doppler_json_gen.outputs.json_content }}
        run: |
          V_CMD="npx vercel --token=${{ steps.doppler.outputs.VERCEL_TOKEN }}"

          # 1. Pull cấu hình mới nhất từ Vercel
          $V_CMD pull --yes --environment=production

          # 2. Add Domain
          $V_CMD domains add ${{ steps.meta.outputs.full_domain }} --force || true

          # 3. Đăng ký các biến môi trường hệ thống (Manual ENVS)
          declare -A ENVS=(
            ["NAME_SERVICE"]="${{ github.event.repository.name }}"
          )

          for key in "${!ENVS[@]}"; do
            printf "%s" "${ENVS[$key]}" | $V_CMD env add "$key" production --force || true
          done

          # 4. Kiểm tra tính hợp lệ của dữ liệu từ Doppler
          if [ -z "$DOPPLER_JSON" ] || [ "$DOPPLER_JSON" = "{}" ]; then
            echo "Lỗi: DOPPLER_JSON trống hoặc không hợp lệ."
            exit 1
          fi

          # 5. Đồng bộ hóa toàn bộ secrets từ Doppler sang Vercel
          echo "Đang đồng bộ các biến từ Doppler sang Vercel..."
          echo "$DOPPLER_JSON" | jq -r 'to_entries[] | .key + " " + (.value | tostring)' | while read -r key value; do
            # Loại bỏ các key không cần thiết hoặc nhạy cảm của hệ thống CI/CD
            if [[ "$key" != "VERCEL_TOKEN" && "$key" != "DOPPLER_TOKEN" && "$key" != "CLOUDFLARE_*" ]]; then
              printf "Setting variable: %s\n" "$key"
              printf "%s" "$value" | $V_CMD env add "$key" production --force || true
            fi
          done


      - name: Deploy to Vercel
        id: vercel_deploy
        run: |
          PARAM="--token=${{ steps.doppler.outputs.VERCEL_TOKEN }} --yes --prod"
          DEPLOY_URL=$(npx vercel deploy $PARAM)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Configure Cloudflare DNS
        env:
          CF_TOKEN: ${{ steps.doppler.outputs.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: ${{ steps.doppler.outputs.CLOUDFLARE_ZONE_ID }}
        run: |
          DOMAIN_NAME="${{ steps.meta.outputs.full_domain }}"
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$DOMAIN_NAME" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id // empty')

          DNS_PAYLOAD=$(jq -n --arg name "${{ steps.meta.outputs.subdomain }}" --arg content "${{ steps.doppler.outputs.VERCEL_CNAME }}" \
            '{type:"CNAME", name:$name, content:$content, ttl:1, proxied:false}')

          if [ -z "$RECORD_ID" ]; then
            METHOD="POST"
            URL="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records"
          else
            METHOD="PUT"
            URL="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID"
          fi

          echo "Updating DNS Record for $DOMAIN_NAME..."
          curl -X $METHOD "$URL" -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" -d "$DNS_PAYLOAD"
